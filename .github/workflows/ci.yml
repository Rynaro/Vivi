name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bats:
    name: bats + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck install.sh
        run: shellcheck -x -S error install.sh

      - name: Install bats-core (pinned v1.13.0)
        run: |
          git clone --depth 1 --branch v1.13.0 \
            https://github.com/bats-core/bats-core.git /tmp/bats

      - name: Run bats suite
        run: /tmp/bats/bin/bats tests/
