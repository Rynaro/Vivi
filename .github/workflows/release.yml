name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer version without the leading v (e.g. 3.0.6)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write
  packages: write

jobs:
  release:
    name: Release Vivi v${{ inputs.version }}
    uses: Rynaro/eidolons/.github/workflows/eidolon-release-template.yml@main
    with:
      version: ${{ inputs.version }}
      eiis-version: "1.4"
    secrets: inherit
